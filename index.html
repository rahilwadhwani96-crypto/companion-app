<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Companion">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1f3a' width='192' height='192'/><text x='50%' y='50%' font-size='120' text-anchor='middle' dominant-baseline='central' fill='white'>💕</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1f3a">
  <title>Relationship Companion</title>
  <link rel="stylesheet" href="styles/reset.css">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/safe-area.css">
  <link rel="stylesheet" href="styles/typography.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">
  <link rel="stylesheet" href="styles/his-theme.css">
  <link rel="stylesheet" href="styles/her-theme.css">
</head>
<body class="theme-his">
  <div class="app-container">
    <!-- Loading Screen -->
    <div class="app-loading">
      <div class="spinner"></div>
      <p>Loading your companion...</p>
    </div>

    <!-- Main App -->
    <div id="app" style="display: none;">
      <!-- Person Selection (First Time) -->
      <div id="personSelector" class="person-selector">
        <div class="selector-content">
          <h1>Welcome to Companion 💕</h1>
          <p>Choose your profile to continue</p>
          <div class="selector-buttons">
            <button onclick="selectPerson('his')" class="selector-btn his-btn">
              <span>👨</span>
              <span>His Theme</span>
            </button>
            <button onclick="selectPerson('her')" class="selector-btn her-btn">
              <span>👩</span>
              <span>Her Theme</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Main App Interface -->
      <div id="mainApp" style="display: none;" class="main-app">
        <!-- Header -->
        <header class="header">
          <div class="header-left">
            <button id="profileBtn" class="profile-btn" onclick="toggleProfileMenu()">
              <span id="profileEmoji">👨</span>
            </button>
          </div>
          <h1 class="header-title">💕 Companion</h1>
          <div class="header-right">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
          </div>
        </header>

        <!-- Profile Menu -->
        <div id="profileMenu" class="profile-menu" style="display: none;">
          <button onclick="selectPerson('his')" class="menu-item">👨 Switch to His</button>
          <button onclick="selectPerson('her')" class="menu-item">👩 Switch to Her</button>
          <hr>
          <button onclick="closeProfileMenu()" class="menu-item close">Close</button>
        </div>

        <!-- Page Container -->
        <main class="page-container">
          <!-- Home Page -->
          <div id="homePage" class="page" style="display: none;">
            <section class="home-section">
              <h2>Today's Tasks</h2>
              <div id="homeTasks" class="tasks-preview"></div>
            </section>
            
            <section class="home-section">
              <h2>Upcoming Milestones</h2>
              <div id="homeMilestones" class="milestones-preview"></div>
            </section>
          </div>

          <!-- Tasks Page -->
          <div id="tasksPage" class="page" style="display: none;">
            <div class="page-header">
              <h2>Tasks</h2>
              <button class="btn-primary" onclick="openCreateTaskModal()">+ Add Task</button>
            </div>

            <!-- Filters -->
            <div class="filters">
              <button class="filter-btn active" onclick="filterTasks('all')">All</button>
              <button class="filter-btn" onclick="filterTasks('open')">Open</button>
              <button class="filter-btn" onclick="filterTasks('completed')">Done</button>
            </div>

            <!-- Tasks List -->
            <div id="tasksList" class="tasks-list"></div>
          </div>

          <!-- Timeline Page -->
          <div id="timelinePage" class="page" style="display: none;">
            <div class="page-header">
              <h2>Our Timeline</h2>
            </div>
            <div id="timeline" class="timeline"></div>
          </div>

          <!-- Notifications Page -->
          <div id="notificationsPage" class="page" style="display: none;">
            <div class="page-header">
              <h2>Notifications</h2>
            </div>
            <div id="notificationsList" class="notifications-list"></div>
          </div>

          <!-- Settings Page -->
          <div id="settingsPage" class="page" style="display: none;">
            <div class="page-header">
              <h2>Settings</h2>
            </div>
            <div class="settings-list">
              <div class="setting-item">
                <label>Notifications</label>
                <input type="checkbox" id="notifToggle" checked>
              </div>
              <div class="setting-item">
                <label>Sound</label>
                <input type="checkbox" id="soundToggle" checked>
              </div>
              <hr>
              <button class="btn-danger" onclick="clearData()">Clear All Data</button>
            </div>
          </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
          <button class="nav-tab active" onclick="goToPage('home')" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
          </button>
          <button class="nav-tab" onclick="goToPage('tasks')" data-page="tasks">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Tasks</span>
          </button>
          <button class="nav-tab" onclick="goToPage('timeline')" data-page="timeline">
            <span class="nav-icon">❤️</span>
            <span class="nav-label">Timeline</span>
          </button>
          <button class="nav-tab" onclick="goToPage('notifications')" data-page="notifications">
            <span class="nav-icon">🔔</span>
            <span class="nav-label">Notifs</span>
          </button>
          <button class="nav-tab" onclick="goToPage('settings')" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
          </button>
        </nav>
      </div>

      <!-- Create Task Modal -->
      <div id="createTaskModal" class="modal-overlay" style="display: none;">
        <div class="modal">
          <div class="modal-header">
            <h2>New Task</h2>
            <button class="modal-close" onclick="closeCreateTaskModal()">✕</button>
          </div>
          <div class="modal-content">
            <input type="text" id="taskTitle" placeholder="Task title" class="input">
            <textarea id="taskDesc" placeholder="Description (optional)" class="input" rows="3"></textarea>
            <select id="taskCategory" class="input">
              <option value="">Select category...</option>
              <option value="Work">🏢 Work</option>
              <option value="Home">🏠 Home</option>
              <option value="Health">💪 Health</option>
              <option value="Fun">🎉 Fun</option>
              <option value="Together">💕 Together</option>
            </select>
            <select id="taskPriority" class="input">
              <option value="low">Low Priority</option>
              <option value="medium" selected>Medium Priority</option>
              <option value="high">High Priority</option>
            </select>
            <input type="date" id="taskDueDate" class="input">
            <label>
              <input type="checkbox" id="taskPrivate"> Private (locked with passcode)
            </label>
          </div>
          <div class="modal-footer">
            <button class="btn-secondary" onclick="closeCreateTaskModal()">Cancel</button>
            <button class="btn-primary" onclick="createTask()">Add Task</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
