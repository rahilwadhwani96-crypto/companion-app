<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Companion">
  <title>Relationship Companion</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>💕 Companion</h1>
    </header>

    <!-- Main Content -->
    <main class="content">
      <!-- Task Form -->
      <div class="form-section">
        <input type="text" id="taskTitle" placeholder="What needs to be done?" class="input">
        <select id="taskAssignee" class="input">
          <option value="">Assign to...</option>
          <option value="user1">Me</option>
          <option value="user2">Partner</option>
        </select>
        <button onclick="createTask()" class="btn-primary">Add Task</button>
      </div>

      <!-- Tasks List -->
      <div class="tasks-section">
        <h2>Tasks</h2>
        <div id="tasksList" class="tasks-list"></div>
      </div>
    </main>

    <!-- Footer Nav -->
    <footer class="nav">
      <button onclick="loadTasks()" class="nav-btn active">📋 Tasks</button>
      <button onclick="alert('Coming soon')" class="nav-btn">❤️ Timeline</button>
      <button onclick="alert('Coming soon')" class="nav-btn">⚙️ Settings</button>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
